# Traefik deployment — requires an external Docker network named "traefik".
# Copy this file to compose.yaml and run: docker compose up -d
services:
  text-to-svg:
    image: ghcr.io/cheminfo/text-to-svg:latest
    build: .
    env_file: .env
    networks:
      - default
      - traefik
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.text-to-svg.rule=Host(`tex.cheminfo.org`)'
      - 'traefik.http.routers.text-to-svg.entrypoints=websecure'
      - 'traefik.http.routers.text-to-svg.tls.certresolver=letsencrypt'
      - 'traefik.http.services.text-to-svg.loadbalancer.server.port=${PORT:-3043}'
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: 2
    pids_limit: 256
    ulimits:
      core: 0
    logging:
      options:
        max-size: '10m'
        max-file: '3'
    restart: unless-stopped

networks:
  traefik:
    external: true
