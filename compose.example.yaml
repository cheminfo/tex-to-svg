services:
  text-to-svg:
    image: ghcr.io/cheminfo/text-to-svg:latest
    build: .
    env_file: .env
    ports:
      - '${PORT:-3043}:${PORT:-3043}'
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: 2
    pids_limit: 256
    ulimits:
      core: 0
    logging:
      options:
        max-size: '10m'
        max-file: '3'
    restart: unless-stopped
